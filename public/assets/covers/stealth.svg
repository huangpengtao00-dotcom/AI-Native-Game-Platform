<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-label="stealth">
    
    <defs>
      <linearGradient id="stealth-bg" x1="0" x2="1" y1="0" y2="1">
        <stop offset="0%" stop-color="#05070b"/>
        <stop offset="48%" stop-color="#1d2930"/>
        <stop offset="100%" stop-color="#76c8ad"/>
      </linearGradient>
      <radialGradient id="stealth-glow" cx="70%" cy="22%" r="74%">
        <stop offset="0%" stop-color="#ffffff" stop-opacity=".34"/>
        <stop offset="38%" stop-color="#ffffff" stop-opacity=".08"/>
        <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
      </radialGradient>
      <filter id="stealth-soft" x="-30%" y="-30%" width="160%" height="160%">
        <feGaussianBlur stdDeviation="18"/>
      </filter>
      <pattern id="stealth-grid" width="64" height="64" patternUnits="userSpaceOnUse">
        <path d="M 64 0 L 0 0 0 64" fill="none" stroke="#fff8ea" stroke-opacity=".08" stroke-width="1"/>
      </pattern>
      <filter id="stealth-shadow" x="-20%" y="-20%" width="140%" height="150%">
        <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#020617" flood-opacity=".35"/>
      </filter>
    </defs>
    <rect width="1200" height="720" fill="url(#stealth-bg)"/>
