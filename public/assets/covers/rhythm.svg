<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-label="rhythm">
    
    <defs>
      <linearGradient id="rhythm-bg" x1="0" x2="1" y1="0" y2="1">
        <stop offset="0%" stop-color="#140d25"/>
        <stop offset="48%" stop-color="#3b246d"/>
        <stop offset="100%" stop-color="#f2c879"/>
      </linearGradient>
      <radialGradient id="rhythm-glow" cx="70%" cy="22%" r="74%">
        <stop offset="0%" stop-color="#ffffff" stop-opacity=".34"/>
        <stop offset="38%" stop-color="#ffffff" stop-opacity=".08"/>
        <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
      </radialGradient>
      <filter id="rhythm-soft" x="-30%" y="-30%" width="160%" height="160%">
        <feGaussianBlur stdDeviation="18"/>
